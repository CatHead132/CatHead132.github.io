<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages URL Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-2xl">
        <h1 class="text-2xl font-bold mb-4">GitHub Pages URL Viewer</h1>
        <p class="mb-4 text-sm text-gray-600">Note: Some websites may not load due to security restrictions.</p>
        <form id="urlForm" class="mb-4">
            <input type="url" id="urlInput" placeholder="Enter a URL" required
                   class="w-full p-2 border border-gray-300 rounded mb-2">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Load Website
            </button>
        </form>
        <div id="frameContainer" class="hidden">
            <iframe id="websiteFrame" src="about:blank" class="w-full h-96 border border-gray-300 rounded"></iframe>
        </div>
        <div id="errorMessage" class="mt-4 text-red-500 hidden"></div>
    </div>

    <script>
        document.getElementById('urlForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = document.getElementById('urlInput').value;
            const frame = document.getElementById('websiteFrame');
            const container = document.getElementById('frameContainer');
            const errorMessage = document.getElementById('errorMessage');
            
            if (url) {
                frame.src = url;
                container.classList.remove('hidden');
                errorMessage.classList.add('hidden');

                frame.onload = function() {
                    try {
                        // Try to access the frame content
                        frame.contentWindow.location.href;
                    } catch (e) {
                        // If we can't access the content, it's likely due to CORS
                        errorMessage.textContent = "Unable to load the website. It may be blocking display in iframes.";
                        errorMessage.classList.remove('hidden');
                    }
                };
            }
        });
    </script>
</body>
</html>
