<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>60-Bar Smooth Audio Visualizer</title>
</head>
<body style="background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <input type="file" accept="audio/*" onchange="loadAudio(this.files[0])" style="position: absolute; top: 10px; left: 10px;">
    <canvas id="visualizer" width="1200" height="400"></canvas>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        let analyser;
        const smoothingFactor = 0.2;
        const barCount = 1000;
        let dataArray = new Uint8Array(barCount).fill(0);

        function loadAudio(file) {
            const reader = new FileReader();
            reader.onload = e => audioCtx.decodeAudioData(e.target.result, playAudio);
            reader.readAsArrayBuffer(file);
        }

        function playAudio(buffer) {
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;  // Increased for more frequency data
            source.connect(analyser).connect(audioCtx.destination);
            source.start(0);
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            const newData = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(newData);
            
            for (let i = 0; i < barCount; i++) {
                const dataIndex = Math.floor(i * newData.length / barCount);
                const targetValue = newData[dataIndex];
                dataArray[i] = dataArray[i] * smoothingFactor + targetValue * (1 - smoothingFactor);
            }

            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = canvas.width / barCount;
            const gradient = canvasCtx.createLinearGradient(0, canvas.height, 0, 0);
            gradient.addColorStop(0, '#FF00FF');  // Magenta at the bottom
            gradient.addColorStop(1, '#FFFFFF');  // White at the top

            canvasCtx.fillStyle = gradient;
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvas.height);

            dataArray.forEach((v, i) => {
                const x = i * barWidth;
                const height = v / 255 * canvas.height;
                canvasCtx.lineTo(x, canvas.height - height);
            });

            canvasCtx.lineTo(canvas.width, canvas.height);
            canvasCtx.closePath();
            canvasCtx.fill();
        }
    </script>
</body>
</html>
