<!DOCTYPE html>
<html>
<head>
  <title>Location-Aware Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    #location-info {
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Welcome to the Location-Aware Website</h1>
  <p>This website will display your current location when you load the page.</p>
  <div id="location-info"></div>

  <script>
    // Get the user's location using the Geolocation API
    navigator.geolocation.getCurrentPosition(function(position) {
      var latitude = position.coords.latitude;
      var longitude = position.coords.longitude;
      
      // Update the location information on the page
      var locationInfo = document.getElementById("location-info");
      locationInfo.textContent = "Your location: " + latitude + ", " + longitude;
    }, function() {
      // Handle errors if the user doesn't allow location access
      var locationInfo = document.getElementById("location-info");
      locationInfo.textContent = "Unable to determine your location.";
    });
  </script>
</body>
</html>
