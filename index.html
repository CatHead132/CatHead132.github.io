<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Playing Video</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        video {
            width: 100%;
            max-width: 600px;
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <video id="videoPlayer" controls autoplay>
        <source src="https://cvws.icloud-content.com/B/AZANez873sJjIAXmqNblxOUWF9MWAbNnxXdu5_mT00gv3Nb7FEvlP1uL/Video.mp4?o=AhdjKvCJ4_KVOfR3mImnlz3nuzRnC2wslsQvrpSebk2F&v=1&x=3&a=CAogg77x26y1If7EaPbkIzQTa7uOfX5UUH_5UrEdYMAWHKgSbxCB1Y7wnjIYgbLq8Z4yIgEAUgQWF9MWWgTlP1uLaifoQoVYh1_4erttp0ujmg3AhLi9lIRKxpIpIhyDwzAusAw8gVeq5oNyJ0r-CYyJdb06hrdbKchXIBKBE-7hhfYIunJsVSB2ghPL3M7dBw1rgg&e=1726278703&fl=&r=8c75fbaa-1e50-43cb-b55b-f5dee6331d05-1&k=cWwiFOHy3jbs0LchyMfs9A&ckc=com.apple.clouddocs&ckz=com.apple.CloudDocs&p=149&s=2V_4S4T5KHgpUBEutkR6NM3pMLU" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        window.onload = function() {
            const videoPlayer = document.getElementById('videoPlayer');
            videoPlayer.load();
            videoPlayer.play();
        };
    </script>
</body>
</html>
