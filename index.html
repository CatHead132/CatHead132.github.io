<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cathead's Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px 20px;
            color: white;
        }
        .topbar .left {
            font-size: 1.5em;
        }
        .topbar .right button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
        }
        .topbar .right button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="left">Cathead's Website</div>
        <div class="right">
            <button onclick="register()">Register</button>
        </div>
    </div>
    <script>
        function register() {
            window.location.href = '/register';
        }
    </script>
</body>
</html>
