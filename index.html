<!DOCTYPE html>
<html>
<head>
  <title>Device Information</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Your Device Information</h1>
  <p>Operating System: <span id="os"></span></p>
  <p>Device Type: <span id="device"></span></p>

  <script>
    // Function to detect the user's operating system
    function getOS() {
      var OSName = "Unknown OS";
      if (navigator.appVersion.indexOf("Win") != -1) OSName = "Windows";
      if (navigator.appVersion.indexOf("Linux") != -1) OSName = "Linux";
      if (navigator.appVersion.indexOf("iPhone") != -1) OSName = "iPhone";
      if (navigator.appVersion.indexOf("iPad") != -1) OSName = "iPad";
      if (navigator.appVersion.indexOf("Android") != -1) OSName = "Android";
      if (navigator.appVersion.indexOf("Mac") != -1) OSName = "Mac";
      return OSName;
    }

    // Function to detect the user's device type
    function getDevice() {
      var userAgent = navigator.userAgent;
      if (userAgent.match(/mobile/i)) {
        return "Mobile";
      } else {
        return "Desktop";
      }
    }

    // Display the user's device information
    document.getElementById("os").textContent = getOS();
    document.getElementById("device").textContent = getDevice();
  </script>
</body>
</html>
