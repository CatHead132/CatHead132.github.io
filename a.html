<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      user-select: none;
    }

    .switch-track {
      position: relative;
      width: 120px;
      height: 56px;
      border-radius: 28px;
      background: #222;
      border: 2px solid #333;
      cursor: grab;
      touch-action: none;
      transition: background 0.3s, border-color 0.3s;
    }

    .switch-track.on {
      background: #1a3a0a;
      border-color: #4a9a30;
    }

    .switch-track.dragging { cursor: grabbing; }

    .switch-thumb {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }

    .switch-track.on .switch-thumb {
      background: #5ecf35;
    }
  </style>
</head>
<body>

  <div class="switch-track" id="track">
    <div class="switch-thumb" id="thumb"></div>
  </div>

<script>
  const track = document.getElementById('track');
  const thumb = document.getElementById('thumb');

  const PAD   = 6;
  const MAX_X = 120 - 40 - PAD * 2;

  let isOn     = false;
  let dragging = false;
  let startX   = 0;
  let startLeft = 0;
  let currentX = 0;
  function startVibration() {
    if (!navigator.vibrate) return;
    navigator.vibrate(Infinity);
  }

  function stopVibration() {
    if (navigator.vibrate) navigator.vibrate(0);
  }

  function setOn(val) {
    const changed = val !== isOn;
    isOn = val;
    track.classList.toggle('on', isOn);
    thumb.style.transition = 'left 0.2s ease, background 0.3s';
    thumb.style.left = (isOn ? MAX_X : 0) + PAD + 'px';
    if (changed) {
      if (isOn) startVibration();
      else stopVibration();
    }
  }

  function px(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function onDown(e) {
    dragging  = true;
    startX    = px(e);
    startLeft = isOn ? MAX_X : 0;
    currentX  = startLeft;
    track.classList.add('dragging');
    thumb.style.transition = 'background 0.3s';
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    currentX = Math.min(MAX_X, Math.max(0, startLeft + px(e) - startX));
    thumb.style.left = currentX + PAD + 'px';
    e.preventDefault();
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    track.classList.remove('dragging');
    setOn(currentX > MAX_X / 2);
  }

  track.addEventListener('mousedown',  onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onUp);
  track.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend',  onUp);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopVibration();
  });
  window.addEventListener('beforeunload', stopVibration);

  thumb.style.left = PAD + 'px';
</script>
</body>
</html>
