<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body>
<div id="r"></div>
<script>
fetch("https://cdn.jsdelivr.net/gh/CatHead132/CatHead132.github.io@latest/gnupdated.html?t="+Date.now())
.then(r=>r.text())
.then(h=>{
  let d=document.getElementById("r"),x=document.createElement("html");
  d.innerHTML=h;x.innerHTML=h;
  let t=x.querySelector("title"),i=x.querySelector('link[rel*="icon"]');
  if(t)document.title=t.textContent;
  if(i){let f=document.createElement("link");f.rel="icon";f.href=i.getAttribute("href");document.head.appendChild(f);}
  d.querySelectorAll("script").forEach(s=>{let n=document.createElement("script");if(s.src)n.src=s.src;else n.textContent=s.textContent;if(s.type)n.type=s.type;document.body.appendChild(n);});
}).catch(e=>console.error(e));
</script>
</body></html>
