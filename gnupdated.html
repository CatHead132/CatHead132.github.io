<!DOCTYPE html>
<html lang="en">
    <head>
    <base href="https://tpcdn.b-cdn.net/gh/gn-math/gn-math.github.io@main/">
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">

    <meta name="theme-color" content="#fb2651" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <meta name="title" content="Turkish Playground">
    <meta name="description" content="Play unbl*cked games on Turkish Playground. Fast, free, no downloads—perfect for school or home.">
    <meta property="og:type" content="website">
    <style>
        :root {
    --grid-columns: 8;
    --primary: #fc2651;
    --primary-hover: #ff4d75;
    --primary-light: rgba(252, 38, 81, 0.15);
    --primary-lighter: rgba(252, 38, 81, 0.08);
    --accent: #a855f7;
    --accent-light: rgba(168, 85, 247, 0.15);
    --success: #34d399;
    --warning: #fbbf24;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-light: #64748b;
    --bg: #000000;
    --bg-secondary: #0a0a0a;
    --surface: #0a0a0a;
    --surface-hover: #1a1a1a;
    --border: #1a1a1a;
    --border-light: #2a2a2a;
    --glass: rgba(10, 10, 10, 0.8);
    --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.4);
    --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.5), 0 1px 2px -1px rgb(0 0 0 / 0.5);
    --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.6), 0 4px 6px -4px rgb(0 0 0 / 0.6);
    --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.7), 0 8px 10px -6px rgb(0 0 0 / 0.7);
    --shadow-glow: 0 0 20px rgba(252, 38, 81, 0.4);
    --gradient-primary: linear-gradient(135deg, #fc2651 0%, #ff4d75 100%);
    --gradient-accent: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
    --gradient-surface: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --radius-xl: 20px;
}

* {
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    color-scheme: dark;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
}

header {
    background: #000000;
    border-bottom: 1px solid var(--border);
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
}

.header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.25rem 1rem 0.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
}

.header-sub {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem 0.4rem;
}

.logo {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(270deg, #fc2651, #ffffff, #f51441);
    background-size: 600% 600%;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 0.01px #ffffff;
    animation: gradientShift 6s linear infinite;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

@media (prefers-reduced-motion: reduce) {
    .logo { animation: none; background-position: 0% 50%; }
    body.american-mode .logo { animation: none; background-position: 0% 50%; }
}

.search-container {
    display: flex;
    flex: 1;
    max-width: 500px;
    gap: 0.75rem;
}

#searchBar {
    flex: 1;
    padding: 0.875rem 1rem;
    border: 0;
    border-radius: var(--radius);
    background: var(--glass);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: background 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
    box-shadow: var(--shadow-sm);
}

#searchBar:focus {
    background: var(--text);
    box-shadow: 0 0 0 3px rgba(252, 38, 81, 0.25), var(--shadow);
    transform: translateY(-1px);
    color: var(--glass);
}

#searchBar::placeholder {
    color: var(--text-muted);
}

#sortOptions,
#filterOptions {
    padding: 0.875rem 1rem;
    border: 0;
    border-radius: var(--radius);
    background: var(--glass);
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    outline: none;
    transition: background 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
    min-width: 130px;
    box-shadow: var(--shadow-sm);
}

#sortOptions:hover,
#filterOptions:hover {
    background: var(--text);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
    color: var(--glass);
}

.control-buttons {
    display: flex;
    gap: 0.5rem;
}

main {
    margin: 0 auto;
    padding: 2rem 1rem;
    padding-bottom: 6rem;
}

#zoneCount {
    margin: 0 0 1.5rem;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

#zoneCount::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--primary);
}

#container,
#featuredZones,
#favoritesContainer {
    display: grid;
    grid-template-columns: repeat(var(--grid-columns), 1fr);
    gap: 0.5rem;
}

#container,
#featuredZones,
#favoritesContainer {
    content-visibility: auto;
}

.zone-item {
    background: var(--gradient-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    position: relative;
    box-shadow: var(--shadow-sm);
    will-change: auto;
    contain: layout style paint;
    aspect-ratio: 1;
}

.zone-item:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-xl);
    border-color: var(--primary);
}

.zone-item:hover::before {
    opacity: 1;
}

.zone-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--primary-light);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    z-index: 1;
}

.zone-item img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: var(--border-light);
}


.zone-item button {
    background: rgba(0,0,0,0.55);
    color: var(--text);
    border: 0;
    padding: 0.5rem;
    cursor: pointer;
    font-weight: 600;
    font-size: clamp(9px, 1.1vw, 13px);
    text-align: center;
    transition: opacity 0.2s ease;
    line-height: 1.4;
    word-break: break-word;
    position: absolute;
    inset: 0;
    z-index: 5;
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.zone-item:hover button {
    opacity: 1;
    color: white;
}

@keyframes spinOnce {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

#refreshZone svg.spinning {
    animation: spinOnce 0.6s linear infinite;
}

@keyframes cardEntrance {
    from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

#zoneViewer {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: slideInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideInUp {
    from {
        transform: translateY(-100%);
    }
    to {
        transform: translateY(0);
    }
}

@keyframes slideOutDown {
    from {
        transform: translateY(0);
    }
    to {
        transform: translateY(-100%);
    }
}

.zone-header {
    background: #000000;
    border-bottom: 1px solid var(--border);
    color: white;
    padding: 0.4rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-lg);
}

.zone-title {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

#zoneName {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.3;
}

#zoneId {
    display: none;
}

#zoneAuthor {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    text-decoration: none;
    transition: color 0.2s ease;
    font-weight: 500;
}

#zoneAuthor:hover {
    color: white;
    text-decoration: underline;
}

.zone-controls {
    display: flex;
    gap: 0.75rem;
}

.zone-controls button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: white;
    padding: 0.625rem 1rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    backdrop-filter: none;
}

.zone-controls button:hover {
    background: var(--surface-hover);
    border-color: var(--primary);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
}

#zoneFrame {
    flex: 1 1 0;
    border: none;
    width: 100%;
    min-height: 0;
    display: block;
    background: #000;
    color-scheme: dark;
}

#popupOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 1rem;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

.popup {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    animation: slideInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideInScale {
    from {
        transform: scale(0.9) translateY(20px);
        opacity: 0;
    }
    to {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
}

@keyframes slideOutScale {
    from {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
    to {
        transform: scale(0.9) translateY(20px);
        opacity: 0;
    }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

.popup-header {
    background: #000000;
    border-bottom: 1px solid var(--border);
    color: white;
    padding: 1.25rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#popupTitle {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
}

#popupClose {
    background: var(--surface);
    border: 1px solid var(--border);
    color: white;
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: var(--radius);
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    line-height: 1;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#popupClose:hover {
    background: var(--surface-hover);
    border-color: var(--primary);
    transform: scale(1.1);
}

#popupBody {
    padding: 1.5rem;
    overflow-y: auto;
    color: var(--text);
}

#popupBody input[type="text"],
#popupBody input[type="file"] {
    width: 100%;
    padding: 0.875rem 1rem;
    margin-bottom: 1.25rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text);
    font-size: 15px;
    transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    outline: none;
}

#popupBody input[type="text"]:focus,
#popupBody input[type="file"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(252, 38, 81, 0.1);
    transform: translateY(-1px);
}

#settingsInGame, #refreshZone, #hideTopbarBtn, #favoriteZoneBtn {
    padding: 0 !important;
    width: 37px !important;
    min-width: unset !important;
    flex-shrink: 0;
}

#favoriteZoneBtn {
    color: var(--text-muted);
    transition: color 0.2s ease, transform 0.2s ease;
}

#favoriteZoneBtn.favorited {
    color: var(--warning);
}

#favoriteZoneBtn { display: flex !important; align-items: center; justify-content: center; }
#favoriteZoneBtn .star-filled { display: none; }
#favoriteZoneBtn .star-outlined { display: block; }
#favoriteZoneBtn.favorited .star-filled { display: block; }
#favoriteZoneBtn.favorited .star-outlined { display: none; }
#favoriteZoneBtn svg { display: block; }

#hideTopbarBtn {
    font-size: 13px;
    line-height: 1;
}

.zone-header {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
}

#zoneViewer.topbar-hidden .zone-header {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
}

#zoneViewer.topbar-hidden #zoneFrame {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#topbarPullTab {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(-100%);
    z-index: 1100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 1px 10px 2px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s ease, opacity 0.3s ease;
    opacity: 0;
    pointer-events: none;
    user-select: none;
}

#topbarPullTab:hover {
    background: var(--surface-hover);
    color: var(--text);
}

#zoneViewer.topbar-hidden #topbarPullTab {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
    pointer-events: auto;
}

footer {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 0.5rem 1rem;
    text-align: center;

    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 100;
}

.footer-links {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
}

.footer-links a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius);
}

.footer-links a:hover {
    color: var(--primary-hover);
    background: var(--primary-light);
    transform: translateY(-1px);
}

@media (max-width: 768px) {
    .header-content {
        flex-direction: column;
        gap: 0.4rem;
        padding: 1rem;
    }

    .search-container {
        width: 100%;
        max-width: none;
    }

    main {
        padding: 1.5rem 1rem;
    }

    #container,
    #featuredZones,
    #favoritesContainer {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.5rem;
    }

    .zone-item button {
        padding: 0.5rem 0.4rem;
        font-size: 13px;
    }

    .footer-links {
        gap: 1.5rem;
    }
}

@media (max-width: 480px) {
    #container,
    #featuredZones,
    #favoritesContainer {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.4rem;
    }

    .popup {
        margin: 0.5rem;
    }

    .zone-item:hover {
        transform: translateY(-6px);
    }

}
.control-button img {
    transition: transform 0.4s ease;
    width: 24px;
    height: 24px;
}

.control-button:hover img {
    transform: rotate(40deg);
}

.control-button,
.control-button:hover {
    box-shadow: none;
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}
.control-button:active {
    transform: translateY(0);
}

.control-buttons button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: white;
    cursor: pointer;
    padding: 0;
    width: 44px;
    height: 44px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
}
.control-buttons button:hover {
    background: var(--surface-hover);
    border-color: var(--primary);
}
.settings-button {
    background: var(--gradient-primary);
    color: white;
    border: 0;
    padding: 0.875rem 1.5rem;
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-sm);
    min-width: 200px;
    width: 100%;
    text-align: center;
}

.settings-button:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.settings-button:active {
    transform: translateY(0);
    box-shadow: var(--shadow-sm);
}

.favorites-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--gradient-primary);
    color: white;
    font-size: 12px;
    font-weight: 600;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    margin-left: 8px;
    padding: 0 6px;
}

.favorite-star {
    position: absolute;
    top: 5px;
    left: 5px;
    width: clamp(14px, calc(32px - var(--grid-columns) * 0.8px), 26px);
    height: clamp(14px, calc(32px - var(--grid-columns) * 0.8px), 26px);
    background: rgba(0, 0, 0, 0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 6;
    transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
    opacity: 0;
}

.zone-item:hover .favorite-star,
.favorite-star.favorited {
    opacity: 1;
}

.favorite-star:hover {
    transform: scale(1.2);
    background: rgba(0, 0, 0, 0.9);
}

.favorite-star.favorited {
    background: var(--primary-light);
}

.favorite-star.favorited::after {
    content: '★';
    color: #ffd700;
    font-size: clamp(8px, calc(20px - var(--grid-columns) * 0.6px), 15px);
    font-weight: bold;
}

.favorite-star:not(.favorited)::after {
    content: '☆';
    color: var(--text-muted);
    font-size: clamp(8px, calc(20px - var(--grid-columns) * 0.6px), 15px);
}

.favorites-has-content {
    background: var(--primary-lighter);
}

.favorites-has-content > summary {
    color: var(--primary);
}

.favorites-has-content > summary .favorites-count {
    background: var(--gradient-primary);
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(252, 38, 81, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(252, 38, 81, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(252, 38, 81, 0);
    }
}

body.american-mode {
    --primary: #1a56db;
    --primary-hover: #3b74f0;
    --primary-light: rgba(26, 86, 219, 0.15);
    --primary-lighter: rgba(26, 86, 219, 0.08);
    --shadow-glow: 0 0 20px rgba(26, 86, 219, 0.4);
    --gradient-primary: linear-gradient(135deg, #1a56db 0%, #3b74f0 100%);
}

body.american-mode .logo {
    background: linear-gradient(90deg,
        #cc0000 0%,
        #ffffff 20%,
        #1a56db 40%,
        #1a56db 60%,
        #ffffff 80%,
        #cc0000 100%
    );
    background-size: 200% 100%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: americanGradient 5s linear infinite;
}

@keyframes americanGradient {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

#americanSlider::before {
    content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;
}
#americanToggle:checked + #americanSlider { background: #1a56db; }
#americanToggle:checked + #americanSlider::before { transform: translateX(22px); }
#americanSlider { background: #444; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
<div id="kittyWrap" style="position:relative;width:72px;height:72px;flex-shrink:0;margin-left:-0.5rem;">
  <img id="kittyImg" src="https://tpcdn.b-cdn.net/gh/CatHead132/CatHead132.github.io@main/kitty/aware.png"
    style="width:72px;height:72px;image-rendering:pixelated;image-rendering:crisp-edges;cursor:default;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;display:block;"
    draggable="false">
  <div id="petLeft" style="position:absolute;top:0;left:calc(50% - 20px);width:20px;height:100%;z-index:10;cursor:default;"></div>
  <div id="petRight" style="position:absolute;top:0;left:50%;width:20px;height:100%;z-index:10;cursor:default;"></div>
</div>
<script>
(function(){
const el=document.getElementById('kittyImg');
const wrap=document.getElementById('kittyWrap');
const B="https://tpcdn.b-cdn.net/gh/CatHead132/CatHead132.github.io@main/kitty/";
const I={aware:B+"aware.png",stand:B+"stand.png",sleep1:B+"sleep1.png",sleep2:B+"sleep2.png",scratch1:B+"scratch1.png",scratch2:B+"scratch2.png",cursor:B+"cursor.png",happy:B+":3.png",yawn:B+"yawn.png"};
const SH=B+"smallheart.gif",BH=B+"bigheart.gif";
const set=s=>{if(document.body.classList.contains('american-mode'))return;el.src=s;};
const rand=(a,b)=>a+Math.random()*b;
const SLEEP_DELAY=12000,ENTER_DELAY=80,LEAVE_DELAY=60,PET_COOLDOWN=1500,THRESHOLD=6;
let sleeping=false,petting=false,hovered=false,onCooldown=false,happy=false;
let lastInteractTime=0,lastAction=null,lastSide=null,awaitingOtherSide=false,strokeCount=0;
let aT=null,fT=null,enterT=null,leaveT=null,strokeResetT=null,cooldownT=null,happyT=null,cursorDelayT=null;

const ct=()=>{clearTimeout(aT);clearInterval(fT);aT=fT=null;};
const fresh=()=>Date.now()-lastInteractTime<SLEEP_DELAY;
const blocked=()=>sleeping||onCooldown||happy;

function reset(){
  ct();clearTimeout(leaveT);clearTimeout(cooldownT);clearTimeout(strokeResetT);clearTimeout(happyT);clearTimeout(cursorDelayT);
  sleeping=petting=hovered=onCooldown=happy=false;
  strokeCount=0;lastSide=null;awaitingOtherSide=false;lastAction=null;
}

function showHappy(cb){
  happy=true;
  ct();clearTimeout(cursorDelayT);clearTimeout(strokeResetT);
  set(I.happy);
  happyT=setTimeout(()=>{
    happy=false;
    if(cb)cb();
  },1200);
}

function heart(big){
  const h=document.createElement('img');
  const ts='?t='+Date.now();
  if(big){
    h.src=BH+ts;
    h.style.cssText='position:absolute;width:32px;height:32px;image-rendering:pixelated;pointer-events:none;z-index:99;bottom:calc(100% - 15px);left:50%;transform:translateX(-50%);';
  } else {
    const ox=(Math.random()*30-15),oy=(Math.random()*6-3);
    h.src=SH+ts;h.className='small-heart';
    h.style.cssText='position:absolute;width:24px;height:24px;image-rendering:pixelated;pointer-events:none;z-index:98;bottom:calc(100% - 8px + '+oy+'px);left:50%;transform:translateX(calc(-50% + '+ox+'px));';
  }
  wrap.appendChild(h);
  setTimeout(()=>h.parentNode&&h.parentNode.removeChild(h),big?800:300);
}

function finishSession(){
  clearTimeout(strokeResetT);clearTimeout(cursorDelayT);
  strokeCount=0;lastSide=null;awaitingOtherSide=false;
  petting=false;hovered=false;
  if(happy)return;
  ct();set(I.stand);lastAction='stand';aT=setTimeout(idleLoop,1000);
}

function onSideEnter(side){
  if(blocked())return;
  lastInteractTime=Date.now();
  clearTimeout(strokeResetT);
  if(side==='right'){
    clearTimeout(cursorDelayT);
    cursorDelayT=setTimeout(()=>{if(!happy)set(I.cursor);},180);
  }
  if(!petting){
    petting=true;hovered=false;ct();
    lastSide=side;awaitingOtherSide=false;
    return;
  }
  if(!awaitingOtherSide||side===lastSide)return;
  lastSide=side;awaitingOtherSide=false;strokeCount++;
  if(strokeCount>=THRESHOLD){
    heart(true);
    onCooldown=true;
    clearTimeout(cooldownT);
    showHappy(()=>{
      onCooldown=false;
      petting=false;hovered=false;
      strokeCount=0;lastSide=null;awaitingOtherSide=false;
      ct();set(I.stand);lastAction='stand';aT=setTimeout(idleLoop,1000);
    });
    return;
  }
  heart(false);
}

function onSideExit(side){
  if(blocked()||!petting)return;
  lastSide=side;awaitingOtherSide=true;
  clearTimeout(strokeResetT);
  strokeResetT=setTimeout(()=>{if(awaitingOtherSide&&!blocked())finishSession();},400);
}

function idleLoop(){
  if(hovered||petting||happy)return;
  if(document.body.classList.contains('american-mode'))return;
  ct();
  let c=['sleep','scratch','yawn','stand'][Math.random()<0.35&&!fresh()?0:Math.random()<0.6?1:Math.random()<0.75?2:3];
  if(c===lastAction&&c!=='stand')c='stand';
  lastAction=c;
  if(c==='sleep')doSleep();
  else if(c==='scratch')doScratch();
  else if(c==='yawn')doYawn();
  else{set(I.stand);aT=setTimeout(idleLoop,rand(2000,2000));}
}

function doSleep(){
  if(hovered||fresh())return idleLoop();
  set(I.yawn);
  aT=setTimeout(()=>{
    if(hovered||fresh())return idleLoop();
    sleeping=true;let f=0;set(I.sleep1);
    fT=setInterval(()=>set((++f%2)?I.sleep2:I.sleep1),800);
    aT=setTimeout(()=>{
      clearInterval(fT);sleeping=false;set(I.yawn);
      aT=setTimeout(()=>{set(I.stand);lastAction='stand';aT=setTimeout(idleLoop,1000);},900);
    },rand(10000,6000));
  },700);
}

function doScratch(){
  if(hovered)return idleLoop();
  let f=0;set(I.scratch1);
  fT=setInterval(()=>set((++f%2)?I.scratch2:I.scratch1),200);
  aT=setTimeout(()=>{ct();set(I.stand);lastAction='stand';aT=setTimeout(idleLoop,rand(800,1000));},rand(1800,1200));
}

function doYawn(){
  if(hovered)return idleLoop();
  set(I.yawn);
  aT=setTimeout(()=>{set(I.stand);lastAction='stand';aT=setTimeout(idleLoop,rand(1000,1500));},2200);
}

const pL=document.getElementById('petLeft'),pR=document.getElementById('petRight');
pL.addEventListener('mouseenter',()=>{if(!document.body.classList.contains('american-mode'))onSideEnter('left');});
pL.addEventListener('mouseleave',()=>{if(!document.body.classList.contains('american-mode'))onSideExit('left');});
pR.addEventListener('mouseenter',()=>{if(!document.body.classList.contains('american-mode'))onSideEnter('right');});
pR.addEventListener('mouseleave',()=>{if(!document.body.classList.contains('american-mode'))onSideExit('right');});

el.addEventListener('mouseenter',()=>{
  if(document.body.classList.contains('american-mode'))return;
  clearTimeout(leaveT);
  if(!petting&&!sleeping&&!happy){
    enterT=setTimeout(()=>{
      if(happy)return;
      hovered=true;lastInteractTime=Date.now();ct();
      awaitingOtherSide=false;lastSide=null;
      set(I.aware);
    },ENTER_DELAY);
  }
});
el.addEventListener('mouseleave',()=>{
  if(document.body.classList.contains('american-mode'))return;
  clearTimeout(enterT);
  leaveT=setTimeout(()=>{hovered=false;if(!petting&&!sleeping&&!happy){set(I.stand);lastAction='stand';aT=setTimeout(idleLoop,1000);}},LEAVE_DELAY);
});
wrap.addEventListener('mouseleave',e=>{
  if(document.body.classList.contains('american-mode'))return;
  if(wrap.contains(e.relatedTarget))return;
  if(!sleeping&&!happy)finishSession();
});
window.addEventListener('message',e=>{
  if(!e.data||e.data.cmd!=='greet')return;
  if(document.body.classList.contains('american-mode'))return;
  reset();set(I.sleep1);
  setTimeout(()=>set(I.sleep2),500);setTimeout(()=>set(I.sleep1),1000);setTimeout(()=>set(I.sleep2),1500);
  setTimeout(()=>{set(I.yawn);setTimeout(()=>{set(I.aware);setTimeout(()=>{set(I.stand);lastAction='stand';idleLoop();},1200);},1000);},2000);
});

set(I.aware);aT=setTimeout(()=>{set(I.stand);aT=setTimeout(idleLoop,1200);},1500);
if(document.body.classList.contains('american-mode')){clearTimeout(aT);}
})();
</script>

        <script>
(function() {
    const WS_URL = 'wss://tpws.b-cdn.net/count';
    let countWs = null;
    function connectCountWs() {
        countWs = new WebSocket(WS_URL);
        countWs.addEventListener('open', () => {
            countWs.send(JSON.stringify({ type: 'subscribe_count' }));
        });
        countWs.addEventListener('message', (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'user_count') {
                    document.getElementById('userCountText').textContent = msg.count + ' online';
                }
            } catch {}
        });
        countWs.addEventListener('close', () => {
            setTimeout(connectCountWs, 3000);
        });
        countWs.addEventListener('error', () => {
            countWs.close();
        });
    }
    connectCountWs();
})();
</script>

let _cachedScheduleType = null;

function getActiveSchedule() {
    if (_cachedScheduleType && Date.now() < _cachedScheduleExpiry) {
        return _cachedScheduleType;
    }
    const saved = localStorage.getItem('turkishPlaygroundSchedule');
    if (saved) {
        const parsed = JSON.parse(saved);
        if (Date.now() < parsed.expiry) {
            _cachedScheduleType = parsed.type;
            _cachedScheduleExpiry = parsed.expiry;
            return parsed.type;
        } else {
            localStorage.removeItem('turkishPlaygroundSchedule');
        }
    }
    _cachedScheduleType = 'regular';
    _cachedScheduleExpiry = Infinity;
    return 'regular';
}

function setSchedule(type) {
    localStorage.setItem('turkishPlaygroundSchedule', JSON.stringify({
        type: type,
        expiry: Date.now() + 12 * 60 * 60 * 1000
    }));
    _cachedScheduleType = type;
    _cachedScheduleExpiry = Date.now() + 12 * 60 * 60 * 1000;
}

function updateClassTimer() {
    const now = new Date();
    const day = now.getDay();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const seconds = now.getSeconds();
    const currentTime = hours * 3600 + minutes * 60 + seconds;

    if (day === 0 || day === 6) {
        return { period: 'Weekend', remaining: 'No school today' };
    }

    const schedule = schedules[getActiveSchedule()];

    const toAmPm = s => { const h = Math.floor(s/3600)%12||12, m = Math.floor((s%3600)/60); return `${h}:${m.toString().padStart(2,'0')} ${Math.floor(s/3600)<12?'AM':'PM'}`; };

    for (let i = 0; i < schedule.length; i++) {
        const p = schedule[i];
        if (currentTime >= p.start && currentTime < p.end) {
            const remaining = p.end - currentTime;
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            if (remaining === 60) {
                alert('1 minute left in ' + p.name + '!');
            }
            return {
                period: p.name,
                remaining: `${mins}:${secs.toString().padStart(2, '0')}`,
                endTime: toAmPm(p.end)
            };
        }
        if (i < schedule.length - 1) {
            const nextPeriod = schedule[i + 1];
            if (currentTime >= p.end && currentTime < nextPeriod.start) {
                const remaining = nextPeriod.start - currentTime;
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                return {
                    period: 'Passing Period',
                    remaining: `${mins}:${secs.toString().padStart(2, '0')}`,
                    endTime: toAmPm(nextPeriod.start)
                };
            }
        }
    }

    if (currentTime < 7*3600+50*60) {
        return { period: 'Before School', remaining: 'School starts at 7:50 AM' };
    }

    return { period: 'After School', remaining: 'School day ended' };
}

async function listZones() {

      if (cachedSha && Date.now() - cachedShaTime < SHA_TTL) {

      } else {
        let sharesponse;

async function fetchPopularity() {

        data.forEach(file => {

            if (idMatch) {
                const id = parseInt(idMatch[1]);
                popularityData[id] = file.hits.total;
            }
        });
    } catch (error) {
        popularityData[0] = 0;
    }
}

function sortZones() {
    const sortBy = sortOptions.value;
    if (sortBy === 'name') {
        zones.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === 'id') {
        zones.sort((a, b) => a.id - b.id);
    } else if (sortBy === 'popular') {
        zones.sort((a, b) => (popularityData[b.id] || 0) - (popularityData[a.id] || 0));
    }
    zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    if (featuredContainer.innerHTML === "") {
        const featured = zones.filter(z => z.featured);
        displayFeaturedZones(featured);
    }
    displayZones(zones);
    displayFavorites();
}

function attachLazyLoader(scope) {
    const lazyImages = scope.querySelectorAll('img.lazy-zone-img');
    const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.classList.remove('lazy-zone-img');
                obs.unobserve(img);
            }
        });
    }, { rootMargin: '100px', threshold: 0.1 });
    lazyImages.forEach(img => observer.observe(img));
}

    zoneItem.onclick = () => openFn(file);
    _cardIndex++;

    const star = document.createElement('div');
    star.className = 'favorite-star';
    if (favorites.includes(file.id)) star.classList.add('favorited');
    star.onclick = (e) => toggleFavorite(file.id, e);
    zoneItem.appendChild(star);

    const img = document.createElement('img');
    img.dataset.src = file.cover.replace('{COVER_URL}', coverURL).replace('{HTML_URL}', htmlURL);
    img.alt = file.name;
    img.loading = 'lazy';
    img.className = 'lazy-zone-img';
    zoneItem.appendChild(img);

    const button = document.createElement('button');
    button.textContent = file.name;
    button.onclick = (e) => { e.stopPropagation(); openFn(file); };
    zoneItem.appendChild(button);
    return zoneItem;
}

function displayZones(zones) {
    if (zones.length === 0) {
        container.innerHTML = 'No zones found.';
        return;
    }
    _cardIndex = 0;
    document.getElementById('allSummary').textContent = `All Zones (${zones.length})`;
    const FIRST_BATCH = 40;
    const CHUNK = 40;
    const firstItems = zones.slice(0, FIRST_BATCH).map(file => makeZoneItem(file, openZone));
    container.replaceChildren(...firstItems);
    attachLazyLoader(container);
    if (zones.length <= FIRST_BATCH) return;
    let offset = FIRST_BATCH;
    function renderChunk(deadline) {
        while (offset < zones.length && (deadline.timeRemaining() > 2 || deadline.didTimeout)) {
            const end = Math.min(offset + CHUNK, zones.length);
            const frag = document.createDocumentFragment();
            for (let i = offset; i < end; i++) frag.appendChild(makeZoneItem(zones[i], openZone));
            container.appendChild(frag);
            offset = end;
        }
        if (offset < zones.length) requestIdleCallback(renderChunk, { timeout: 500 });
        else attachLazyLoader(container);
    }
    requestIdleCallback(renderChunk, { timeout: 500 });
}

function processHtml(html) {

        .replace(/https?:\/\/cdn\.jsdelivr\.net/g, 'https://tpcdn.b-cdn.net')
        .replace(/https?:\/\/rawgit\.com\/([^/]+)\/([^/]+)\/([^/]+)\/([^"'\s]+)/g, 'https://tpcdn.b-cdn.net/githack/$1/$2/$3/$4')
        .replace(/https?:\/\/raw\.githack\.com\/([^/]+)\/([^/]+)\/([^/]+)\/([^"'\s]+)/g, 'https://tpcdn.b-cdn.net/githack/$1/$2/$3/$4')
        .replace(/https?:\/\/rawcdn\.githack\.com\/([^/]+)\/([^/]+)\/([^/]+)\/([^"'\s]+)/g, 'https://tpcdn.b-cdn.net/githack/$1/$2/$3/$4')
        .replace(/https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/([^"'\s]+)/g, 'https://tpcdn.b-cdn.net/githack/$1/$2/$3/$4');
    const doc = new DOMParser().parseFromString(cleaned, 'text/html');
    doc.querySelectorAll('script').forEach(s => {
        const src = s.getAttribute('src') || '';
        const content = s.textContent || '';
        if (content.includes('WebSocket') || content.includes('chatEl') || content.includes('WS_URL')) return;
        if (
            src.match(/googletagmanager|googlesyndication|pagead2|fundingchoices|adsbygoogle/) ||
            content.includes('window.dataLayer') ||
            content.includes('while(!![])') ||
            content.includes('adsbygoogle') ||
            content.includes('UravPbGESYjDUNqxKcf')
        ) s.remove();
    });
    doc.querySelectorAll('ins').forEach(el => {
        if ((el.className || '').includes('adsbygoogle')) el.remove();
    });
    return adKiller + doc.documentElement.outerHTML;
}

                zoneFrame = document.createElement("iframe");
                zoneFrame.id = "zoneFrame";
                zoneViewer.appendChild(zoneFrame);

function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
    if (typeof obj === 'string') {
      return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
    }

    if (obj instanceof Uint8Array) {
      if (obj.length > maxArrayLen) {
        return `[Uint8Array too large (${obj.length} bytes), truncated]`;
      }
      return obj;
    }

    if (Array.isArray(obj)) {
      return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
    }

    if (obj && typeof obj === 'object') {
      const newObj = {};
      for (const key in obj) {
        if (obj.hasOwnProperty(key)) {
          newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen);
        }
      }
      return newObj;
    }

    return obj;
  }

async function saveData() {
    alert("This might take a while, dont touch anything other than this OK button");
    const result = {};
    result.cookies = document.cookie;
    result.localStorage = {...localStorage};
    result.sessionStorage = {...sessionStorage};
    result.indexedDB = {};
    const dbs = await indexedDB.databases();
    for (const dbInfo of dbs) {
      if (!dbInfo.name) continue;
      result.indexedDB[dbInfo.name] = {};
      await new Promise((resolve, reject) => {
        const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
        openRequest.onerror = () => reject(openRequest.error);
        openRequest.onsuccess = () => {
          const db = openRequest.result;
          const storeNames = Array.from(db.objectStoreNames);
          if (storeNames.length === 0) {
            resolve();
            return;
          }
          const transaction = db.transaction(storeNames, "readonly");
          const storePromises = [];
          for (const storeName of storeNames) {
            result.indexedDB[dbInfo.name][storeName] = [];
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();
            const p = new Promise((res, rej) => {
              getAllRequest.onsuccess = () => {
                result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100);
                res();
              };
              getAllRequest.onerror = () => rej(getAllRequest.error);
            });
            storePromises.push(p);
          }
          Promise.all(storePromises).then(() => resolve());
        };
      });
    }

    result.caches = {};
    const cacheNames = await caches.keys();
    for (const cacheName of cacheNames) {
      const cache = await caches.open(cacheName);
      const requests = await cache.keys();
      result.caches[cacheName] = [];
      for (const req of requests) {
        const response = await cache.match(req);
        if (!response) continue;
        const cloned = response.clone();
        const contentType = cloned.headers.get('content-type') || '';
        let body;
        try {
          if (contentType.includes('application/json')) {
            body = await cloned.json();
          } else if (contentType.includes('text') || contentType.includes('javascript')) {
            body = await cloned.text();
          } else {
            const buffer = await cloned.arrayBuffer();
            body = btoa(String.fromCharCode(...new Uint8Array(buffer)));
          }
        } catch (e) {
          body = '[Unable to read body]';
        }
        result.caches[cacheName].push({
          url: req.url,
          body,
          contentType
        });
      }
    }

    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], {
        type: "application/octet-stream"
    }));
    link.download = `${Date.now()}.data`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  async function loadData(event) {

                    objectStore.clear().onsuccess = () => {
                      for (const item of stores[storeName]) {
                        objectStore.put(item);
                      }
                      pendingStores--;
                      if (pendingStores === 0) resolve();
                    };
                  }
                };
                request.onerror = () => reject(request.error);
              });
            }
          }

          if (data.caches) {
            for (const cacheName in data.caches) {
              const cache = await caches.open(cacheName);
              await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));

              for (const entry of data.caches[cacheName]) {
                let responseBody;
                if (entry.contentType.includes('application/json')) {
                  responseBody = JSON.stringify(entry.body);
                } else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) {
                  responseBody = entry.body;
                } else {
                  const binaryStr = atob(entry.body);
                  const len = binaryStr.length;
                  const bytes = new Uint8Array(len);
                  for (let i = 0; i < len; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                  }
                  responseBody = bytes.buffer;
                }
                const headers = new Headers({ 'content-type': entry.contentType });
                const response = new Response(responseBody, { headers });
                await cache.put(entry.url, response);
              }
            }
          }
        alert("Data loaded");
    };
    reader.readAsText(file);
  }

async function submitLeaderboard() {
    const username = (localStorage.getItem('tp_username') || '').trim();
    if (!username) {
        alert('Please enter a username in the Leaderboard Username field first!');
        return;
    }
    const wasTracking = playStartTime !== null;
    stopPlaytimeTracking();
    if (wasTracking) startPlaytimeTracking();
    try {
        await fetch('https://tpws.b-cdn.net/leaderboard/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, score: Math.floor(totalPlaytime), timestamp: Date.now() })
        });
        alert('Score submitted to leaderboard!');
    } catch (e) {
        alert('Failed to submit score: ' + e.message);
    }
}

function formatPlaytime(seconds) {
    const days = Math.floor(seconds / 86400);
    const hours = Math.floor((seconds % 86400) / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    return `${days}d:${hours}h:${minutes}m:${secs}s`;
}

function isBlockedDomain(url) {
    if (!url || typeof url !== 'string') return false;
    try {
        const hostname = new URL(url, location.origin).hostname;
        if (schoolList.some(s => hostname.includes(s))) return true;
        if (adList.some(ad => hostname === ad || hostname.endsWith('.' + ad))) return true;
        return false;
    } catch (e) {
        return false;
    }
}

const originalFetch = window.fetch;
window.fetch = function (url, options) {
    if (url && isBlockedDomain(url)) {
        console.warn(`[TP] Blocked request to: ${typeof url === 'string' ? url : url?.url}`);
        return Promise.reject(new Error("Blocked"));
    }
    return originalFetch.apply(this, arguments);
};

const originalOpen = XMLHttpRequest.prototype.open;
XMLHttpRequest.prototype.open = function (method, url) {
    if (url && isBlockedDomain(url)) {
        console.warn(`[TP] Blocked XHR to: ${url}`);
        return;
    }
    return originalOpen.apply(this, arguments);
};

const _origCreateElement = document.createElement.bind(document);
document.createElement = function(tag) {
    const el = _origCreateElement(tag);
    if (tag.toLowerCase() === 'script') {
        const _origSetAttribute = el.setAttribute.bind(el);
        el.setAttribute = function(name, value) {
            if (name === 'src' && isBlockedDomain(value)) {
                console.warn(`[TP] Blocked script inject: ${value}`);
                return;
            }
            return _origSetAttribute(name, value);
        };
        Object.defineProperty(el, 'src', {
            set(value) {
                if (isBlockedDomain(value)) {
                    console.warn(`[TP] Blocked script src: ${value}`);
                    return;
                }
                _origSetAttribute('src', value);
            },
            get() { return el.getAttribute('src') || ''; }
        });
    }
    return el;
};

let _gunShootDelayT = null;

function enableGunMode() {
    const wrap = document.getElementById('kittyWrap');
    if (!wrap) return;
    const kittyImg = document.getElementById('kittyImg');
    kittyImg.src = GUN_NORMAL;
    kittyImg.style.cursor = 'crosshair';

    wrap._gunClickHandler = () => fireGun(wrap);
    wrap.addEventListener('click', wrap._gunClickHandler);

function disableGunMode() {
