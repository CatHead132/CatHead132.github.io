<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
body{display:flex;align-items:center;justify-content:center;cursor:pointer}
#kitty{image-rendering:pixelated;image-rendering:crisp-edges;width:64px;height:64px;object-fit:contain;user-select:none;pointer-events:none}
</style>
</head>
<body>
<img id="kitty" src="https://cdn.jsdelivr.net/gh/CatHead132/CatHead132.github.io@main/kitty/aware.png" alt="kitty" draggable="false">
<script>
const B="https://cdn.jsdelivr.net/gh/CatHead132/CatHead132.github.io@main/kitty/";
const I={
  aware:B+"aware.png",stand:B+"stand.png",
  sleep1:B+"sleep1.png",sleep2:B+"sleep2.png",
  scratch1:B+"scratch1.png",scratch2:B+"scratch2.png",
  cursor:B+"cursor.png",happy:B+":3.png",yawn:B+"yawn.png"
};
const el=document.getElementById("kitty");
const set=img=>el.src=img;
const rand=(a,b)=>a+Math.random()*b;

let sleeping=false,rubbing=false,clicking=false;
let rubCount=0,lastInteractTime=0,lastClickX=null;
let aT=null,fT=null,leaveT=null;

const SLEEP_DELAY=12000,RUB_N=5,LEAVE_DELAY=800;

function clearTimers(){clearTimeout(aT);clearInterval(fT);aT=fT=null}
function freshEnough(){return Date.now()-lastInteractTime<SLEEP_DELAY}

function reset(){
  clearTimers();clearTimeout(leaveT);
  sleeping=rubbing=clicking=false;rubCount=0;lastClickX=null;
}

set(I.aware);
aT=setTimeout(()=>{set(I.stand);aT=setTimeout(idleLoop,1200)},1500);

function idleLoop(){
  if(clicking||rubbing)return;
  clearTimers();
  const r=Math.random();
  if(r<0.35&&!freshEnough())doSleep();
  else if(r<0.6)doScratch();
  else if(r<0.75)doYawn();
  else{set(I.stand);aT=setTimeout(idleLoop,rand(2000,2000));}
}

function doSleep(){
  if(clicking||freshEnough())return idleLoop();
  set(I.yawn);
  aT=setTimeout(()=>{
    if(clicking||freshEnough())return idleLoop();
    sleeping=true;
    let f=0;set(I.sleep1);
    fT=setInterval(()=>set((++f%2)?I.sleep2:I.sleep1),800);
    aT=setTimeout(()=>{
      clearInterval(fT);sleeping=false;set(I.yawn);
      aT=setTimeout(()=>{
        set(I.stand);aT=setTimeout(idleLoop,1000);
      },900);
    },rand(10000,6000));
  },700);
}

function doScratch(){
  if(clicking)return idleLoop();
  let f=0;set(I.scratch1);
  fT=setInterval(()=>set((++f%2)?I.scratch2:I.scratch1),200);
  aT=setTimeout(()=>{clearInterval(fT);set(I.stand);aT=setTimeout(idleLoop,rand(800,1000));},rand(1800,1200));
}

function doYawn(){
  if(clicking)return idleLoop();
  set(I.yawn);
  aT=setTimeout(()=>{set(I.stand);aT=setTimeout(idleLoop,rand(1000,1500));},2200);
}

window.addEventListener("message",e=>{
  if(!e.data||e.data.cmd!=="greet")return;
  reset();
  set(I.sleep1);
  setTimeout(()=>set(I.sleep2),500);
  setTimeout(()=>set(I.sleep1),1000);
  setTimeout(()=>set(I.sleep2),1500);
  setTimeout(()=>{set(I.yawn);
    setTimeout(()=>{set(I.aware);
      setTimeout(()=>{set(I.stand);idleLoop();},1200);
    },1000);
  },2000);
});

document.addEventListener("mousedown",e=>{
  if(sleeping)return;
  lastInteractTime=Date.now();
  clearTimeout(leaveT);
  if(!clicking){
    clicking=true;
    clearTimers();
    set(I.cursor);
    lastClickX=e.clientX;
    rubCount=0;
  }
});

document.addEventListener("mousemove",e=>{
  if(!clicking||sleeping||rubbing)return;
  lastInteractTime=Date.now();
  if(lastClickX!==null){
    const dx=Math.abs(e.clientX-lastClickX);
    if(dx>10){
      rubCount++;
      if(rubCount>=RUB_N){
        rubbing=true;
        clicking=false;
        rubCount=0;
        clearTimers();
        set(I.happy);
        aT=setTimeout(()=>{
          rubbing=false;
          set(I.cursor);
          aT=setTimeout(()=>{
            clicking=false;
            set(I.stand);
            idleLoop();
          },LEAVE_DELAY);
        },3500);
      }
    } else {
      rubCount=Math.max(0,rubCount-0.5);
    }
    lastClickX=e.clientX;
  }
});

document.addEventListener("mouseup",()=>{
  if(!clicking||rubbing)return;
  leaveT=setTimeout(()=>{
    clicking=false;
    lastClickX=null;
    rubCount=0;
    if(!rubbing&&!sleeping){
      set(I.stand);
      idleLoop();
    }
  },LEAVE_DELAY);
});
</script>
</body>
</html>
